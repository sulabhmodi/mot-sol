---
apiVersion: v1beta1
kind: AgentConfig
metadata:
  name: {{ cluster_name }}

{% if rendezvous_ip is defined %}
rendezvousIP: {{ rendezvous_ip }}
{% endif %}

additionalNTPSources:
{{ ntp_servers | to_nice_yaml(indent=2) | indent(2, true) }}

hosts:
{% for hostname, hostvars in hosts.items() %}
  - hostname: {{ hostname }}
    role: {{ hostvars.role }}
    rootDeviceHints:
      deviceName: {{ hostvars.root_disk }}

{% if hostvars.type is defined and hostvars.type == 'baremetal' and hostvars.bmc_ip is defined %}
    bmc:
      address: redfish-virtualmedia://{{ hostvars.bmc_ip }}/redfish/v1/Systems/1
      username: {{ bmc_username }}
      password: {{ bmc_password }}
{% endif %}

    interfaces:
{% for interface in hostvars.interfaces %}
      - name: {{ interface.name }}
        macAddress: {{ interface.macAddress }}
{% endfor %}

    networkConfig:
      interfaces:
{% if hostvars.use_bond is defined and hostvars.use_bond %}
        - name: {{ bond_name }}
          type: bond
          state: up
          mtu: {{ mtu }}
          copy-mac-from: {{ primary_nic }}
          ipv4:
            enabled: true
            dhcp: false
            address:
              - ip: {{ hostvars.host_ip }}
                prefix-length: {{ machine_network_prefix }}
          ipv6:
            enabled: false
          link-aggregation:
            mode: {{ bond_mode }}
            options:
              miimon: '100'
            port:
              - {{ primary_nic }}
{% if secondary_nic is defined and secondary_nic %}
              - {{ secondary_nic }}
{% endif %}

{% for interface in hostvars.interfaces %}
        - name: {{ interface.name }}
          type: ethernet
          state: up
          mac-address: {{ interface.macAddress }}
          ipv4:
            enabled: false
          ipv6:
            enabled: false
{% endfor %}

{% else %}
        - name: {{ hostvars.interfaces[0].name }}
          type: ethernet
          state: up
          mtu: {{ mtu }}
          mac-address: {{ hostvars.interfaces[0].macAddress }}
          ipv4:
            enabled: true
            dhcp: false
            address:
              - ip: {{ hostvars.host_ip }}
                prefix-length: {{ machine_network_prefix }}
          ipv6:
            enabled: false
{% endif %}

      dns-resolver:
        config:
{{ dns_config | to_nice_yaml(indent=2) | indent(10, true) }}

      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: {{ machine_network_gateway }}
            next-hop-interface: {{ bond_name if (hostvars.use_bond is defined and hostvars.use_bond) else hostvars.interfaces[0].name }}
{% endfor %}
