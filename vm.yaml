apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: rhel-test-vm
spec:
  running: true
  dataVolumeTemplates:
    - metadata:
        name: rhel-rootdisk
      spec:
        source:
          http:
            url: "https://download.fedoraproject.org/pub/fedora/linux/releases/39/Cloud/x86_64/images/Fedora-Cloud-Base-39-1.5.x86_64.qcow2"
        storage:
          storageClassName: hpe-nimble
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
  template:
    metadata:
      labels:
        kubevirt.io/domain: rhel-test-vm
    spec:
      domain:
        cpu:
          cores: 2
        resources:
          requests:
            memory: 2Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
            - name: vlan20
              bridge: {}
      networks:
        - name: default
          pod: {}
        - name: vlan20
          multus:
            networkName: default/vlan20-net
      volumes:
        - name: rootdisk
          dataVolume:
            name: rhel-rootdisk


